# Local dev Postgres for the pilot.
#
# pgvector/pgvector:pg16 ships both extensions 0001 needs (pgcrypto is in
# contrib, vector is the image's reason for existing). PG 16 also satisfies
# 0002's PG 15+ requirement (`UNIQUE ... NULLS NOT DISTINCT`).
#
#   docker compose up -d
#   python scripts/apply_migrations.py
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: cheatsheet
      POSTGRES_PASSWORD: cheatsheet
      POSTGRES_DB: cheatsheet
    ports:
      - "5432:5432"
    volumes:
      - cheatsheet_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cheatsheet"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cheatsheet_pgdata:
