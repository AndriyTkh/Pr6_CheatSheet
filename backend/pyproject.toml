[project]
name = "cheatsheet-backend"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "fastapi",
    "uvicorn[standard]",
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg",
    "pydantic-settings",
    "procrastinate",
    "fastapi-users[sqlalchemy]",
    "openai",
    "docling",
    "pgvector",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
